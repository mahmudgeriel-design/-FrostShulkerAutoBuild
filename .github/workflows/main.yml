name: Build FrostShulkerAuto
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    # Профессиональный авто-фикс: ищет любой jar (кроме системных) и переименовывает под проект
    - name: Auto Fix Path
      run: |
        mkdir -p FrostShulkerAuto/src/main/resources/
        find . -maxdepth 3 -name "*.jar" ! -path "*/target/*" -exec cp {} FrostShulkerAuto/src/main/resources/paper-api.jar \;
    - name: Build with Maven
      run: mvn -f FrostShulkerAuto/pom.xml clean package
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FrostShulkerAutoPlugin
        path: "**/target/*.jar"
